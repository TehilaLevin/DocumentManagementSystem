<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול מסמכים</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .main-content {
            padding: 30px;
        }
        
        .user-selector {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e1e5f2;
        }
        
        .user-selector h3 {
            color: #4a5568;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .user-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .user-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .user-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .user-btn.active {
            background: #48bb78;
        }
        
        .current-user {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            margin-top: 15px;
            display: inline-block;
            font-weight: 500;
        }
        
        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }
        
        .section h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
        }
        
        .btn-info {
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
        }
        
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .document-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            transition: transform 0.3s ease;
        }
        
        .document-card:hover {
            transform: translateY(-5px);
        }
        
        .document-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .document-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .document-title {
            font-weight: 600;
            color: #2d3748;
            font-size: 1.1rem;
        }
        
        .document-meta {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .document-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn-small {
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-success {
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            color: #276749;
        }
        
        .alert-error {
            background: #fed7d7;
            border: 1px solid #feb2b2;
            color: #c53030;
        }
        
        .history-item {
            background: #f7fafc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-right: 4px solid #667eea;
        }
        
        .history-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .operation-badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .operation-create { background: #c6f6d5; color: #276749; }
        .operation-update { background: #bee3f8; color: #2c5282; }
        .operation-delete { background: #fed7d7; color: #c53030; }
        
        @media (max-width: 768px) {
            .documents-grid {
                grid-template-columns: 1fr;
            }
            
            .user-buttons {
                justify-content: center;
            }
            
            .document-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-file-alt"></i> מערכת ניהול מסמכים</h1>
            <p>ניהול, עריכה והורדה של מסמכים בצורה פשוטה ויעילה</p>
        </div>
        
        <div class="main-content">
            <div class="user-selector">
                <h3><i class="fas fa-user"></i> בחירת משתמש</h3>
                <div class="user-buttons">
                    <button class="user-btn active" onclick="setUser('user1')">משתמש 1</button>
                    <button class="user-btn" onclick="setUser('user2')">משתמש 2</button>
                    <button class="user-btn" onclick="setUser('user3')">משתמש 3</button>
                </div>
                <div class="current-user" id="currentUser">
                    <i class="fas fa-user-check"></i> משתמש פעיל: user1
                </div>
            </div>
            
            <div class="alert alert-success" id="successAlert"></div>
            <div class="alert alert-error" id="errorAlert"></div>
            
            <div class="section">
                <h2><i class="fas fa-plus-circle"></i> הוספת מסמך חדש</h2>
                <form id="documentForm">
                    <div class="form-group">
                        <label for="docPath">נתיב המסמך</label>
                        <input type="text" id="docPath" placeholder="/documents/my-document" required>
                    </div>
                    <div class="form-group">
                        <label for="docTitle">כותרת המסמך</label>
                        <input type="text" id="docTitle" placeholder="כותרת המסמך" required>
                    </div>
                    <div class="form-group">
                        <label for="docContent">תוכן המסמך</label>
                        <textarea id="docContent" placeholder="תוכן המסמך..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> שמור מסמך
                    </button>
                </form>
            </div>
            
            <div class="section">
                <h2><i class="fas fa-folder-open"></i> המסמכים שלי</h2>
                <div class="loading" id="documentsLoading" style="display: none;">
                    <div class="spinner"></div>
                    טוען מסמכים...
                </div>
                <div class="documents-grid" id="documentsGrid"></div>
                <button class="btn btn-info" onclick="loadDocuments()">
                    <i class="fas fa-sync-alt"></i> רענן רשימה
                </button>
            </div>
            
            <div class="section">
                <h2><i class="fas fa-history"></i> היסטוריית פעולות</h2>
                <div class="loading" id="historyLoading" style="display: none;">
                    <div class="spinner"></div>
                    טוען היסטוריה...
                </div>
                <div id="historyList"></div>
                <button class="btn btn-info" onclick="loadHistory()">
                    <i class="fas fa-sync-alt"></i> רענן היסטוריה
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = 'user1';
        let documents = [];

        function setUser(user) {
            currentUser = user;
            document.getElementById('currentUser').innerHTML = `<i class="fas fa-user-check"></i> משתמש פעיל: ${user}`;
            
            // Update active button
            document.querySelectorAll('.user-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            loadDocuments();
            loadHistory();
        }

        function showAlert(message, type = 'success') {
            const alertId = type === 'success' ? 'successAlert' : 'errorAlert';
            const alert = document.getElementById(alertId);
            alert.textContent = message;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        async function apiRequest(url, options = {}) {
            try {
                const response = await fetch(url, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': currentUser,
                        ...options.headers
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    return await response.json();
                }
                return response;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        document.getElementById('documentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const path = document.getElementById('docPath').value;
            const title = document.getElementById('docTitle').value;
            const content = document.getElementById('docContent').value;
            
            try {
                await apiRequest('http://127.0.0.1:5000/api/documents', {
                    method: 'POST',
                    body: JSON.stringify({ path, title, content })
                });
                
                showAlert('המסמך נשמר בהצלחה!', 'success');
                document.getElementById('documentForm').reset();
                loadDocuments();
                loadHistory();
            } catch (error) {
                showAlert('שגיאה בשמירת המסמך: ' + error.message, 'error');
            }
        });

        async function loadDocuments() {
            const loading = document.getElementById('documentsLoading');
            const grid = document.getElementById('documentsGrid');
            
            loading.style.display = 'block';
            grid.innerHTML = '';
            
            try {
                documents = await apiRequest('http://127.0.0.1:5000/api/documents');
                displayDocuments(documents);
            } catch (error) {
                showAlert('שגיאה בטעינת המסמכים: ' + error.message, 'error');
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayDocuments(docs) {
            const grid = document.getElementById('documentsGrid');
            
            if (docs.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: #718096; padding: 40px;">אין מסמכים להצגה</p>';
                return;
            }
            
            grid.innerHTML = docs.map(doc => `
                <div class="document-card">
                    <div class="document-header">
                        <div class="document-icon">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <div class="document-title">${doc.title}</div>
                    </div>
                    <div class="document-meta">
                        <div><i class="fas fa-user"></i> ${doc.author}</div>
                        <div><i class="fas fa-folder"></i> ${doc.path}</div>
                        <div><i class="fas fa-calendar"></i> ${new Date(doc.createdAt).toLocaleDateString('he-IL')}</div>
                    </div>
                    <div class="document-actions">
                        <button class="btn btn-info btn-small" onclick="viewDocument('${doc.id}')">
                            <i class="fas fa-eye"></i> צפה
                        </button>
                        <button class="btn btn-success btn-small" onclick="downloadPDF('${doc.id}')">
                            <i class="fas fa-download"></i> הורד PDF
                        </button>
                        <button class="btn btn-danger btn-small" onclick="deleteDocument('${doc.id}')">
                            <i class="fas fa-trash"></i> מחק
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function viewDocument(id) {
            try {
                const doc = await apiRequest(`http://127.0.0.1:5000/api/documents/${id}`);
                alert(`כותרת: ${doc.title}\n\nתוכן:\n${doc.content}`);
            } catch (error) {
                showAlert('שגיאה בטעינת המסמך: ' + error.message, 'error');
            }
        }

        async function downloadPDF(id) {
            try {
                const response = await fetch(`http://127.0.0.1:5000/api/documents/${id}/download`, {
                    headers: { 'X-User-Id': currentUser }
                });
                
                if (!response.ok) throw new Error('שגיאה בהורדת הקובץ');
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `document-${id}.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                showAlert('הקובץ הורד בהצלחה!', 'success');
            } catch (error) {
                showAlert('שגיאה בהורדת הקובץ: ' + error.message, 'error');
            }
        }

        async function deleteDocument(id) {
            if (!confirm('האם אתה בטוח שברצונך למחוק את המסמך?')) return;
            
            try {
                await apiRequest(`http://127.0.0.1:5000/api/documents/${id}`, {
                    method: 'DELETE'
                });
                
                showAlert('המסמך נמחק בהצלחה!', 'success');
                loadDocuments();
                loadHistory();
            } catch (error) {
                showAlert('שגיאה במחיקת המסמך: ' + error.message, 'error');
            }
        }

        async function loadHistory() {
            const loading = document.getElementById('historyLoading');
            const list = document.getElementById('historyList');
            
            loading.style.display = 'block';
            
            try {
                const response = await apiRequest('http://127.0.0.1:5000/api/history');
                const history = response.data || response || [];
                displayHistory(history);
            } catch (error) {
                showAlert('שגיאה בטעינת ההיסטוריה: ' + error.message, 'error');
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayHistory(history) {
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #718096; padding: 40px;">אין היסטוריה להצגה</p>';
                return;
            }
            
            list.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="history-meta">
                        <div>
                            <span class="operation-badge operation-${item.operationType.toLowerCase()}">${item.operationType}</span>
                            <strong>${item.documentPath}</strong>
                        </div>
                        <div>${new Date(item.timestamp).toLocaleString('he-IL')}</div>
                    </div>
                    <div>משתמש: ${item.user} | מחבר המסמך: ${item.documentAuthor}</div>
                </div>
            `).join('');
        }

        // Load initial data
        loadDocuments();
        loadHistory();
    </script>
</body>
</html>
